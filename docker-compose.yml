version: '3.8'

services:
  backend:
    build: 
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: sentinelx_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sentinelx:password@postgres:5432/sentinelx
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - postgres
    networks:
      - sentinelx_net
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: sentinelx_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - sentinelx_net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: sentinelx_db
    environment:
      - POSTGRES_USER=sentinelx
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sentinelx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentinelx_net
    restart: unless-stopped

networks:
  sentinelx_net:
    driver: bridge

volumes:
  postgres_data:
